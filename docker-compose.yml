# ==============================================================
# 三弓床弩弹射动力学仿真与穿甲威力分析系统
# Docker Compose 编排
#
# 服务清单:
#   1. clickhouse          : ClickHouse 列式数据库 (TTL + 降采样 MV)
#   2. ch-init             : 一次性执行 init.sql 建表 (等待 clickhouse ready 后退出)
#   3. mqtt                : Eclipse Mosquitto MQTT 代理 (告警推送)
#   4. ballistics-server   : Go 后端 (UDP 采集 + 仿真 + 侵彻 + 告警 + HTTP API + Prometheus/pprof)
#   5. sensor-simulator    : Python UDP 传感器模拟器 (拉力等级可配)
#   6. nginx               : 前端静态资源 + Gzip 压缩 + /api 反向代理 + /metrics 限流
#
# 常用命令:
#   cp .env.template .env
#   docker compose config       # 预览最终配置
#   docker compose up -d        # 启动全部
#   docker compose logs -f ballistics-server
#   docker compose restart sensor-simulator
#   docker compose down -v      # 停止并删除卷
# ==============================================================

name: ballistics-system
services:

  # ---------------------------------------------------------------
  # 1) ClickHouse —— 5 张原始 MergeTree 表 + 1 张 1h SummingMergeTree 降采样 MV
  # ---------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:${CH_VERSION:-24.3}
    container_name: bs-clickhouse
    hostname: clickhouse
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "8123:8123"     # HTTP (DBeaver / curl)
      - "9000:9000"     # Native (Go driver)
    volumes:
      - ${CLICKHOUSE_DATA:-./data/clickhouse}:/var/lib/clickhouse
      - ./clickhouse/config/config.xml:/etc/clickhouse-server/config.d/99-ballistics.xml:ro
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    environment:
      CLICKHOUSE_DB:       ${CLICKHOUSE_DB:-ballistics}
      CLICKHOUSE_USER:     ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
    healthcheck:
      test:     ["CMD", "clickhouse-client", "--host", "127.0.0.1", "--port", "9000", "-q", "SELECT 1"]
      interval: 8s
      timeout:  5s
      retries:  15
      start_period: 20s

  # ---------------------------------------------------------------
  # 2) MQTT Broker (Mosquitto)
  # ---------------------------------------------------------------
  mqtt:
    image: eclipse-mosquitto:${MQTT_VERSION:-2.0}
    container_name: bs-mqtt
    hostname: mqtt
    restart: unless-stopped
    command: >
      sh -c '
        cat > /mosquitto/config/mosquitto.conf <<EOF
      listener 1883
      listener 9001
      protocol websockets
      allow_anonymous true
      persistence false
      connection_messages true
      EOF
        /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf
      '
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-8083}:9001"
    healthcheck:
      test:     ["CMD", "mosquitto_sub", "-t", "$SYS/broker/uptime", "-C", "1", "-W", "3", "-i", "hc-$$PPID"]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 10s

  # ---------------------------------------------------------------
  # 3) Go Ballistics Server —— 多阶段构建, 静态二进制
  # ---------------------------------------------------------------
  ballistics-server:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        GOARCH: amd64
        GOOS:   linux
    image: ballistics-server:latest
    container_name: bs-server
    hostname: ballistics-server
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
      mqtt:
        condition: service_started
    ports:
      - "8080:8080/udp"   # UDP 接收 (传感器)
      - "8081:8081/tcp"   # HTTP API
      - "9090:9090/tcp"   # /metrics + /debug/pprof/
    environment:
      UDP_PORT:             "${UDP_PORT:-8080}"
      HTTP_ADDR:            "${HTTP_ADDR:-:8081}"
      METRICS_ADDR:         "${METRICS_ADDR:-:9090}"
      CLICKHOUSE_DSN:       "${CLICKHOUSE_DSN:-clickhouse://clickhouse:9000?database=ballistics&username=default&password=}"
      MQTT_BROKER:          "${MQTT_BROKER:-tcp://mqtt:1883}"
      MQTT_CLIENT_ID:       "${MQTT_CLIENT_ID:-ballistics-alert}"
      MQTT_TOPIC:           "${MQTT_TOPIC:-ballistics/alerts}"
      MQTT_USERNAME:        "${MQTT_USERNAME:-}"
      MQTT_PASSWORD:        "${MQTT_PASSWORD:-}"
      DEFORMATION_MAX:      "${DEFORMATION_MAX:-15.0}"
      MIN_RANGE:            "${MIN_RANGE:-300.0}"
      DYNAMICS_CONFIG_PATH: "${DYNAMICS_CONFIG_PATH:-config/dynamics_params.json}"
      ARMOR_CONFIG_PATH:    "${ARMOR_CONFIG_PATH:-config/armor_params.json}"
    volumes:
      # 允许运行时覆盖配置 (image 自带一份默认)
      - ./config:/app/config:ro
    healthcheck:
      test:     ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:9090/healthz"]
      interval: 10s
      timeout:  3s
      retries:  5
      start_period: 15s

  # ---------------------------------------------------------------
  # 4) 传感器模拟器 (Python, UDP) —— 可改 env 调拉力等级
  # ---------------------------------------------------------------
  sensor-simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    image: sensor-simulator:latest
    container_name: bs-sim
    restart: unless-stopped
    depends_on:
      ballistics-server:
        condition: service_healthy
    environment:
      SIM_HOST:     "${SIM_HOST:-ballistics-server}"
      SIM_PORT:     "${SIM_PORT:-8080}"
      SIM_DEVICE:   "${SIM_DEVICE:-chuangnu-001}"
      SIM_INTERVAL: "${SIM_INTERVAL:-60}"
      SIM_LEVEL:    "${SIM_LEVEL:-mid}"
      SIM_ARROW:    "${SIM_ARROW:-bodkin}"
      SIM_WEAR:     "${SIM_WEAR:-0.0005}"
      SIM_TEMP:     "${SIM_TEMP:-20.0}"
      SIM_HUMID:    "${SIM_HUMID:-50.0}"
      SIM_SEED:     "${SIM_SEED:-0}"
      SIM_COUNT:    "${SIM_COUNT:-0}"
      SIM_LOG:      "${SIM_LOG:-}"
    command: []   # 空即使用环境变量; 若需覆盖可写: ["--level", "extreme", "-i", "5"]

  # ---------------------------------------------------------------
  # 5) Nginx —— 前端静态资源 (Gzip) + /api 反代 + 指标内网化
  # ---------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: bs-nginx
    restart: unless-stopped
    depends_on:
      ballistics-server:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    healthcheck:
      test:     ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:80/healthz"]
      interval: 15s
      timeout:  3s
      retries:  3
      start_period: 5s

# ==============================================================
# 自定义桥接网络
# ==============================================================
networks:
  default:
    name: ballistics-net
    driver: bridge
