# ==============================================================
# 三弓床弩动力学分析系统 —— Nginx 反向代理 + Gzip 静态资源
# ==============================================================

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    # ----------------------------------------------------------------
    # 全局安全与性能
    # ----------------------------------------------------------------
    sendfile             on;
    tcp_nopush           on;
    tcp_nodelay          on;
    keepalive_timeout    65;
    types_hash_max_size  2048;
    client_max_body_size 16M;

    include  /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ----------------------------------------------------------------
    # 访问日志 (JSON 风格, 方便 Promtail/Loki 采集)
    # ----------------------------------------------------------------
    log_format main_json escape=json
        '{'
            '"time_local":"$time_local",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_status":"$upstream_status",'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent"'
        '}';

    access_log  /var/log/nginx/access.log  main_json;
    error_log   /var/log/nginx/error.log   warn;

    # ----------------------------------------------------------------
    # Gzip 压缩 (JS / CSS / HTML / JSON / SVG / 字体 全开启)
    # ----------------------------------------------------------------
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_min_length     1024;
    gzip_disable        "msie6";
    gzip_buffers        16 8k;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        font/ttf
        font/eot
        font/woff
        font/woff2
        image/svg+xml
        image/x-icon
        image/webp;

    # ----------------------------------------------------------------
    # 前端静态资源
    #   /          → index.html
    #   /*.js/*.html → /usr/share/nginx/html
    # ----------------------------------------------------------------
    root   /usr/share/nginx/html;
    index  index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态 JS 缓存 7 天（配合 CDN 可以更长）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|eot|ttf|otf)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # index.html 不缓存，每次都刷新
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # ----------------------------------------------------------------
    # /api/*  → Go 后端  :8081
    # /metrics → Go 指标 :9090
    # /debug/pprof/* → Go pprof :9090
    # ----------------------------------------------------------------
    location /api/ {
        proxy_pass         http://ballistics-server:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # CORS (让前端 /api 直接被浏览器跨域, 与 Go 内部 CORS 双保险)
        add_header         Access-Control-Allow-Origin  $http_origin always;
        add_header         Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header         Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
        add_header         Access-Control-Max-Age       86400 always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_connect_timeout   10s;
        proxy_send_timeout      30s;
        proxy_read_timeout      60s;
        proxy_buffering         off;
    }

    # 指标 + pprof 只允许内网 (docker-compose network)
    location /metrics {
        allow   10.0.0.0/8;
        allow   172.16.0.0/12;
        allow   192.168.0.0/16;
        allow   127.0.0.1;
        deny    all;

        proxy_pass          http://ballistics-server:9090/metrics;
        proxy_http_version  1.1;
    }

    location /debug/pprof/ {
        allow   10.0.0.0/8;
        allow   172.16.0.0/12;
        allow   192.168.0.0/16;
        allow   127.0.0.1;
        deny    all;

        proxy_pass          http://ballistics-server:9090/debug/pprof/;
        proxy_http_version  1.1;
    }

    # ----------------------------------------------------------------
    # 健康检查
    # ----------------------------------------------------------------
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "nginx-ok\n";
    }
}
